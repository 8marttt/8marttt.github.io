<!DOCTYPE html><html lang="az"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Sənin üçün xüsusi sürpriz!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-loader">
        <div class="loader-center-stage">
            <div class="gift-box-container" id="gift-box-container">
                <div class="gift-box">
                    <div class="gift-box-lid" id="gift-box-lid">
                        <div class="gift-bow">
                            <div class="bow-loop bow-left"></div>
                            <div class="bow-loop bow-right"></div>
                            <div class="bow-knot"></div>
                        </div>
                    </div>
                    <div class="gift-box-body"></div>
                </div>
                <div class="gift-box-shadow"></div>
            </div>
            <div class="logo-reveal" id="logo-reveal">
                <img src="images/compstyle%20logo.PNG" alt="Logo" class="loader-logo">
            </div>
        </div>
        <p class="loader-text">Təbrik hazırlanır...</p>
    </div>

    <div class="hearts-container"></div>

    <div class="main-container valentine-container">
        <div class="name-reveal">
            <h1 class="girl-name" id="girl-name-display">...</h1>
        </div>
        <p class="romantic-intro">Aşağıdakı çarxı çevir və taleyinin sənə nə hədiyyə gətirdiyini öyrən! 🎡</p>

        <div class="wheel-section">
            <div class="wheel-wrapper">
                <div class="wheel-pointer"><div class="pointer-arrow"></div></div>
                <canvas id="wheel-canvas" width="320" height="320"></canvas>
            </div>
            <button id="spin-btn" onclick="spinWheel()" class="spin-btn">ÇARXI ÇEVİR ✨</button>
        </div>

        <div id="result-section" class="result-section">
            <div class="gift-reveal">
                <span class="gift-emoji" id="gift-emoji-display">🎁</span>
                <h3 class="gift-name" id="gift-name-display">Hədiyyə</h3>
            </div>
            <div class="love-message-card">
                <p id="love-message-display"></p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
