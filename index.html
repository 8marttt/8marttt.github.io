<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 8 Mart - Xüsusi Təbrik Yarat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hearts-container"></div>
    <div class="main-container">
        <div class="logo-section">
            <div class="march8-badge">
                <span class="march8-number">8</span>
                <span class="march8-mart">MART</span>
            </div>
            <h1 class="logo-title">Qadınlar Günü</h1>
            <p class="logo-subtitle">Sevdiyiniz qadına xüsusi təbrik yaradın 🌸</p>
        </div>

        <div class="glass-card">
            <form id="creator-form">
                <div class="form-group">
                    <label class="form-label">🌸 Onun Adı</label>
                    <input type="text" id="girl-name" class="form-input" placeholder="Məsələn: Ayşən" required>
                </div>
                <div class="form-group">
                    <label class="form-label">✍️ Təbrik Mesajın</label>
                    <textarea id="love-message" class="form-input" rows="3" placeholder="Xüsusi bir şeylər yaz..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary">✨ Link Yarat</button>
            </form>

            <div id="link-result" class="link-result" style="display:none;">
                <div class="link-box">
                    <p>🔗 Hazır link:</p>
                    <div id="link-text" class="link-text" style="word-break: break-all; color: #ffd700; font-size: 14px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
